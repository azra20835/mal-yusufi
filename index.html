<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dart Oyunu</title>

<style>
body {
  margin: 0;
  background: #111;
  color: white;
  font-family: Arial;
  text-align: center;
}

#board {
  position: relative;
  width: 360px;
  height: 360px;
  margin: 20px auto;
  border-radius: 50%;
  background: radial-gradient(circle,
    #fff 0%, #fff 5%,
    #e53935 5%, #e53935 10%,
    #fff 10%, #fff 15%,
    #000 15%, #000 25%,
    #fff 25%, #fff 35%,
    #e53935 35%, #e53935 50%,
    #222 50%, #222 100%);
  overflow: hidden;
  box-shadow: 0 0 25px black;
}

#centerImg {
  position: absolute;
  width: 90px;
  height: 90px;
  border-radius: 50%;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  object-fit: cover;
  border: 3px solid white;
}

/* OK */
.arrow {
  position: absolute;
  width: 60px;
  height: 6px;
  background: linear-gradient(to right, #d4af37, #ffcc00);
  border-radius: 4px;
  transform-origin: left center;
}

.arrow::after {
  content: "";
  position: absolute;
  right: -14px;
  top: -6px;
  border-left: 14px solid #ff9900;
  border-top: 8px solid transparent;
  border-bottom: 8px solid transparent;
}

#score {
  font-size: 22px;
}
</style>
</head>

<body>

<h2>Dart Oyunu 🎯</h2>
<p>Puan: <span id="score">0</span></p>

<div id="board">
  <img src="ben.jpg" id="centerImg">
</div>

<script>
let score = 0;
const board = document.getElementById("board");
const scoreText = document.getElementById("score");

function shoot(x, y) {

  const arrow = document.createElement("div");
  arrow.className = "arrow";

  const startX = 180;
  const startY = 180;

  arrow.style.left = startX + "px";
  arrow.style.top = startY + "px";

  board.appendChild(arrow);

  const dx = x - startX;
  const dy = y - startY;

  const angle = Math.atan2(dy, dx) * 180 / Math.PI;
  arrow.style.transform = `rotate(${angle}deg)`;

  let t = 0;
  const steps = 60; // daha uzun = daha yumuşak

  const anim = setInterval(() => {
    t++;

    // 🎯 KAVİS (parabol hissi)
    const progress = t / steps;

    const nx = startX + dx * progress;
    const ny = startY + dy * progress - (Math.sin(progress * Math.PI) * 60);

    arrow.style.left = nx + "px";
    arrow.style.top = ny + "px";

    // hız düşsün (gerçekçilik)
    arrow.style.opacity = 1;

    if (t >= steps) {
      clearInterval(anim);

      // saplanma hissi
      arrow.style.filter = "drop-shadow(0 0 5px black)";

      const dist = Math.sqrt(dx*dx + dy*dy);

      if (dist < 30) score += 50;
      else if (dist < 80) score += 20;
      else if (dist < 130) score += 10;
      else score += 5;

      scoreText.textContent = score;
    }

  }, 12);
}

/* PC */
board.addEventListener("click", e => {
  const r = board.getBoundingClientRect();
  shoot(e.clientX - r.left, e.clientY - r.top);
});

/* TELEFON */
board.addEventListener("touchstart", e => {
  const r = board.getBoundingClientRect();
  const t = e.touches[0];
  shoot(t.clientX - r.left, t.clientY - r.top);
});
</script>

</body>
</html>
