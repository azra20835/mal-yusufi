<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Dart Oyunu</title>

<style>
body{
    margin:0;
    background:#222;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    overflow:hidden;
}

#oyun{
    position:relative;
    width:500px;
    height:500px;
}

#tahta{
    width:500px;
    height:500px;
    border-radius:50%;
    border:8px solid black;
    background:
    radial-gradient(circle,
    red 0%,
    red 12%,
    white 12%,
    white 24%,
    black 24%,
    black 36%,
    white 36%,
    white 48%,
    black 48%,
    black 60%,
    white 60%,
    white 72%,
    black 72%,
    black 84%,
    white 84%,
    white 100%);
}

#foto{
    position:absolute;
    width:120px;
    height:120px;
    border-radius:50%;
    top:190px;
    left:190px;
    object-fit:cover;
    border:4px solid gold;
}

#ok{
    position:absolute;
    width:70px;
    left:215px;
    top:430px;
    cursor:pointer;
    transition:all 0.8s ease;
}
</style>
</head>

<body>

<div id="puan"
style="
position:absolute;
top:20px;
left:20px;
color:white;
font-size:30px;
font-weight:bold;">
Puan: 0
</div>

<div id="oyun">

<div id="tahta"></div>

<img id="foto" src="ben.jpg">

</div>

</body>

<script>

const oyun = document.getElementById("oyun");
const ok = document.getElementById("ok");

oyun.addEventListener("click", function(e){

const rect = oyun.getBoundingClientRect();

let x = e.clientX - rect.left - 35;
let y = e.clientY - rect.top - 35;

ok.style.left = x + "px";
ok.style.top = y + "px";

setTimeout(()=>{
    ok.style.left="215px";
    ok.style.top="430px";
},1000);

});

</script>

</body>
</html>
