<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dart Oyunu</title>

<style>
body{
  margin:0;
  background:#111;
  color:white;
  font-family:Arial;
  text-align:center;
}

#board{
  position:relative;
  width:360px;
  height:360px;
  margin:20px auto;
  border-radius:50%;
  background: radial-gradient(circle,
    #fff 0%, #fff 5%,
    #e53935 5%, #e53935 10%,
    #fff 10%, #fff 15%,
    #000 15%, #000 25%,
    #fff 25%, #fff 35%,
    #e53935 35%, #e53935 50%,
    #222 50%, #222 100%);
  overflow:hidden;
  box-shadow:0 0 25px black;
}

#centerImg{
  position:absolute;
  width:90px;
  height:90px;
  border-radius:50%;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  object-fit:cover;
  border:3px solid white;
}

/* OK */
.arrow{
  position:absolute;
  width:80px;
  height:10px;
  transform-origin:left center;
  pointer-events:none;
}

/* saplanma */
.stuck{
  filter: drop-shadow(0 0 4px black);
}
</style>
</head>

<body>

<h2>Dart Oyunu 🎯</h2>
<p>Puan: <span id="score">0</span></p>

<div id="board">
  <img src="ben.jpg" id="centerImg">
</div>

<script>
let score = 0;
const board = document.getElementById("board");
const scoreText = document.getElementById("score");

function makeArrow(){
  const div = document.createElement("div");
  div.className = "arrow";

  // GERÇEĞE EN YAKIN OK (SVG)
  div.innerHTML = `
  <svg viewBox="0 0 120 20" width="80" height="10">
    <!-- gövde (ahşap) -->
    <rect x="10" y="8" width="70" height="4" fill="#8B5A2B"/>

    <!-- ok ucu (metal) -->
    <polygon points="80,10 105,2 105,18" fill="#C0C0C0"/>

    <!-- tüy -->
    <polygon points="10,10 0,0 0,20" fill="#ff4444"/>
    <polygon points="10,10 2,2 2,18" fill="#ff7777"/>
  </svg>
  `;

  return div;
}

function shoot(x,y){

  const arrow = makeArrow();

  const startX = 180;
  const startY = 180;

  arrow.style.left = startX + "px";
  arrow.style.top = startY + "px";

  board.appendChild(arrow);

  const dx = x - startX;
  const dy = y - startY;

  const angle = Math.atan2(dy,dx) * 180/Math.PI;

  let rot = angle;

  let t = 0;
  const steps = 55;

  const anim = setInterval(()=>{

    t++;
    const p = t/steps;

    const nx = startX + dx*p;
    const ny = startY + dy*p - Math.sin(p*Math.PI)*50;

    rot += 4;

    arrow.style.left = nx + "px";
    arrow.style.top = ny + "px";
    arrow.style.transform = `rotate(${rot}deg)`;

    if(t>=steps){
      clearInterval(anim);

      arrow.classList.add("stuck");

      // SAPLAN
      arrow.style.transform = `rotate(${angle}deg)`;

      const dist = Math.sqrt(dx*dx + dy*dy);

      if(dist<30) score+=50;
      else if(dist<80) score+=20;
      else if(dist<130) score+=10;
      else score+=5;

      scoreText.textContent = score;
    }

  },12);
}

board.addEventListener("click",e=>{
  const r=board.getBoundingClientRect();
  shoot(e.clientX-r.left,e.clientY-r.top);
});

board.addEventListener("touchstart",e=>{
  const r=board.getBoundingClientRect();
  const t=e.touches[0];
  shoot(t.clientX-r.left,t.clientY-r.top);
});
</script>

</body>
</html>
