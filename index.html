<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Dart Oyunu</title>

<style>

body{
    margin:0;
    background:#222;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    height:100vh;
    overflow:hidden;
}

#puan{
    color:white;
    font-size:32px;
    font-weight:bold;
    margin-bottom:15px;
}

#oyun{
    position:relative;
    width:500px;
    height:500px;
}

#tahta{
    width:500px;
    height:500px;
    border-radius:50%;
    background:
    radial-gradient(circle,
    red 0%,
    red 10%,
    white 10%,
    white 20%,
    black 20%,
    black 35%,
    white 35%,
    white 50%,
    black 50%,
    black 65%,
    white 65%,
    white 80%,
    black 80%,
    black 100%);
}

#foto{
    position:absolute;
    width:120px;
    height:120px;
    border-radius:50%;
    top:190px;
    left:190px;
    object-fit:cover;
    border:4px solid gold;
}

#yay{
    position:absolute;
    width:90px;
    bottom:-10px;
    left:205px;
    z-index:10;
    pointer-events:none;
}

.ok{
    position:absolute;
    width:55px;
    pointer-events:none;
}

</style>
</head>

<body>

<div id="puan">Puan: 0</div>

<div id="oyun">

<div id="tahta"></div>

<img id="foto" src="ben.jpg">

<img id="yay"
src="https://cdn-icons-png.flaticon.com/512/149/149604.png">

</div>

<script>

const oyun = document.getElementById("oyun");
const puanYazi = document.getElementById("puan");

let puan = 0;

oyun.addEventListener("click", function(e){

const rect = oyun.getBoundingClientRect();

const hedefX = e.clientX - rect.left;
const hedefY = e.clientY - rect.top;

const ok = document.createElement("img");

ok.src =
"https://cdn-icons-png.flaticon.com/512/32/32195.png";

ok.className = "ok";

ok.style.left = "222px";
ok.style.top = "440px";

oyun.appendChild(ok);

setTimeout(()=>{

ok.style.transition = "all 0.5s linear";

ok.style.left = (hedefX-25)+"px";
ok.style.top = (hedefY-25)+"px";

},20);

const merkezX = 250;
const merkezY = 250;

const uzaklik = Math.sqrt(
Math.pow(hedefX-merkezX,2)+
Math.pow(hedefY-merkezY,2)
);

if(uzaklik < 60){
    puan += 100;
}
else if(uzaklik < 120){
    puan += 50;
}
else if(uzaklik < 180){
    puan += 20;
}
else{
    puan += 10;
}

puanYazi.innerText = "Puan: " + puan;

});

</script>

</body>
</html>
