<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dart Oyunu</title>

<style>
body {
  margin: 0;
  background: #111;
  color: white;
  font-family: Arial;
  text-align: center;
}

h2 { margin-top: 10px; }

/* DART TAHTASI */
#board {
  position: relative;
  width: 340px;
  height: 340px;
  margin: 20px auto;
  border-radius: 50%;
  background: radial-gradient(circle,
    #ffffff 0%, #ffffff 5%,
    #e53935 5%, #e53935 10%,
    #ffffff 10%, #ffffff 15%,
    #000000 15%, #000000 25%,
    #ffffff 25%, #ffffff 35%,
    #e53935 35%, #e53935 50%,
    #222 50%, #222 100%);
  overflow: hidden;
  box-shadow: 0 0 20px black;
}

/* ORTA FOTO */
#centerImg {
  position: absolute;
  width: 90px;
  height: 90px;
  border-radius: 50%;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  object-fit: cover;
  border: 3px solid white;
}

/* OK TASARIMI */
.arrow {
  position: absolute;
  width: 55px;
  height: 6px;
  background: linear-gradient(to right, #d4af37, #ffcc00);
  border-radius: 4px;
  transform-origin: left center;
}

/* OK UCU */
.arrow::after {
  content: "";
  position: absolute;
  right: -12px;
  top: -5px;
  border-left: 12px solid #ff9900;
  border-top: 8px solid transparent;
  border-bottom: 8px solid transparent;
}

/* SAPLANMA EFEKTİ */
.stuck {
  filter: drop-shadow(0 0 4px black);
}

#score {
  font-size: 22px;
}
</style>
</head>

<body>

<h2>Dart Oyunu 🎯</h2>
<p>Puan: <span id="score">0</span></p>

<div id="board">
  <img src="ben.jpg" id="centerImg">
</div>

<script>
let score = 0;
const board = document.getElementById("board");
const scoreText = document.getElementById("score");

function shoot(x, y) {

  const arrow = document.createElement("div");
  arrow.className = "arrow";

  const startX = 170;
  const startY = 170;

  arrow.style.left = startX + "px";
  arrow.style.top = startY + "px";

  board.appendChild(arrow);

  // açı hesapla
  const dx = x - startX;
  const dy = y - startY;
  const angle = Math.atan2(dy, dx) * 180 / Math.PI;

  arrow.style.transform = `rotate(${angle}deg)`;

  let t = 0;
  const steps = 18;

  const anim = setInterval(() => {
    t++;

    const nx = startX + dx * (t / steps);
    const ny = startY + dy * (t / steps);

    arrow.style.left = nx + "px";
    arrow.style.top = ny + "px";

    if (t >= steps) {
      clearInterval(anim);

      arrow.classList.add("stuck");

      const dist = Math.sqrt(dx*dx + dy*dy);

      if (dist < 30) score += 50;
      else if (dist < 80) score += 20;
      else if (dist < 130) score += 10;
      else score += 5;

      scoreText.textContent = score;
    }
  }, 12);
}

/* PC */
board.addEventListener("click", e => {
  const r = board.getBoundingClientRect();
  shoot(e.clientX - r.left, e.clientY - r.top);
});

/* TELEFON */
board.addEventListener("touchstart", e => {
  const r = board.getBoundingClientRect();
  const t = e.touches[0];
  shoot(t.clientX - r.left, t.clientY - r.top);
});
</script>

</body>
</html>
