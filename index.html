<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dart Oyunu</title>

<style>
body {
  margin: 0;
  background: #111;
  color: white;
  text-align: center;
  font-family: Arial;
}

h2 { margin-top: 10px; }

/* DART TAHTASI */
#board {
  position: relative;
  width: 320px;
  height: 320px;
  margin: 20px auto;
  border-radius: 50%;
  background: radial-gradient(circle,
    #fff 0%,
    #fff 5%,
    red 5%,
    red 10%,
    white 10%,
    white 15%,
    black 15%,
    black 25%,
    white 25%,
    white 35%,
    red 35%,
    red 50%,
    #222 50%,
    #222 100%);
  box-shadow: 0 0 20px black;
}

/* ORTADAKİ FOTO */
#centerImg {
  position: absolute;
  width: 90px;
  height: 90px;
  border-radius: 50%;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  border: 3px solid white;
  object-fit: cover;
}

/* GÜZEL OK */
.arrow {
  position: absolute;
  width: 40px;
  height: 6px;
  background: linear-gradient(to right, gold, orange);
  border-radius: 5px;
  transform: rotate(0deg);
}

.arrow::after {
  content: "";
  position: absolute;
  right: -10px;
  top: -4px;
  border-left: 10px solid orange;
  border-top: 7px solid transparent;
  border-bottom: 7px solid transparent;
}

#score {
  font-size: 22px;
}
</style>
</head>

<body>

<h2>Dart Oyunu 🎯</h2>
<p>Puan: <span id="score">0</span></p>

<div id="board">
  <!-- kendi resmini buraya koy -->
  <img src="ben.jpg" id="centerImg">
</div>

<script>
let score = 0;
const board = document.getElementById("board");
const scoreText = document.getElementById("score");

function shoot(x, y) {

  // OK oluştur
  const arrow = document.createElement("div");
  arrow.className = "arrow";

  arrow.style.left = x + "px";
  arrow.style.top = y + "px";

  // hafif animasyon
  arrow.style.transform = "scale(0.5)";
  setTimeout(() => {
    arrow.style.transform = "scale(1)";
  }, 50);

  board.appendChild(arrow);

  // merkez hesap
  const cx = 160;
  const cy = 160;

  const dx = x - cx;
  const dy = y - cy;
  const dist = Math.sqrt(dx*dx + dy*dy);

  if (dist < 30) score += 50;
  else if (dist < 80) score += 20;
  else if (dist < 130) score += 10;
  else score += 5;

  scoreText.textContent = score;
}

// PC + TELEFON
board.addEventListener("click", e => {
  const r = board.getBoundingClientRect();
  shoot(e.clientX - r.left, e.clientY - r.top);
});

board.addEventListener("touchstart", e => {
  const r = board.getBoundingClientRect();
  const t = e.touches[0];
  shoot(t.clientX - r.left, t.clientY - r.top);
});
</script>

</body>
</html>
