<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dart Oyunu</title>

<style>
body {
  margin: 0;
  text-align: center;
  background: #222;
  color: white;
}

#board {
  position: relative;
  width: 300px;
  height: 300px;
  margin: 20px auto;
  background: url("dartboard.jpg");
  background-size: cover;
  border-radius: 50%;
}

#centerImg {
  position: absolute;
  width: 80px;
  height: 80px;
  top: 110px;
  left: 110px;
  border-radius: 50%;
}

.arrow {
  position: absolute;
  width: 30px;
  height: 10px;
  background: yellow;
}
</style>
</head>

<body>

<h2>Dart Oyunu</h2>
<p>Puan: <span id="score">0</span></p>

<div id="board">
  <img src="ben.jpg" id="centerImg">
</div>

<script>
let score = 0;
const board = document.getElementById("board");
const scoreText = document.getElementById("score");

// hem mouse hem telefon için
function shoot(x, y) {
  const arrow = document.createElement("div");
  arrow.className = "arrow";
  arrow.style.left = x + "px";
  arrow.style.top = y + "px";
  board.appendChild(arrow);

  // merkez hesap (basit)
  const centerX = 150;
  const centerY = 150;

  const dx = x - centerX;
  const dy = y - centerY;
  const distance = Math.sqrt(dx*dx + dy*dy);

  if (distance < 50) score += 50;
  else if (distance < 100) score += 20;
  else score += 5;

  scoreText.textContent = score;
}

// click + touch support
board.addEventListener("click", function(e) {
  const rect = board.getBoundingClientRect();
  shoot(e.clientX - rect.left, e.clientY - rect.top);
});

board.addEventListener("touchstart", function(e) {
  const rect = board.getBoundingClientRect();
  const touch = e.touches[0];
  shoot(touch.clientX - rect.left, touch.clientY - rect.top);
});
</script>

</body>
</html>
